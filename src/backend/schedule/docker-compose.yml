services:
  mariadb:
    image: mariadb:latest
    container_name: schedule-mariadb
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: schedule
      MYSQL_USER: sequence
      MYSQL_PASSWORD: sequence
    ports:
      - "3308:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: schedule-phpmyadmin
    environment:
      PMA_HOST: mariadb   # 기본적으로 mariadb에 연결
      PMA_HOSTS: mariadb # mariadb
      PMA_USER: sequence
      PMA_PASSWORD: sequence
      MYSQL_ROOT_PASSWORD: 1234  # MariaDB root 비밀번호
    ports:
      - "8088:80"  # phpMyAdmin에 접속하는 포트
    depends_on:
      - mariadb
volumes:
  mariadb_data: